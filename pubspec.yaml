name: shadchan
description: "אפליקציית שידוכים חדשה ב-Flutter."
publish_to: 'none'
version: 1.0.15+16

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  go_router: ^14.8.1
  provider: ^6.1.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  file_picker: ^8.1.6
  flutter_native_splash: ^2.4.1
  flutter_contacts: ^2.0.2
  kosher_dart: ^2.0.16
  flutter_card_swiper: ^7.0.2
  font_awesome_flutter: ^11.0.0
  excel: ^4.0.6
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon3.png"

flutter_native_splash:
  color: "#FFF8FA"
  image: "assets/icon3.png"
  color_dark: "#1A1A2E"
  image_dark: "assets/icon3.png"
  android_12:
    color: "#FFF8FA"
    color_dark: "#1A1A2E"

flutter:
  uses-material-design: true
  assets:
    - assets/icon3.png
